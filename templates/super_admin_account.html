{% extends "base.html" %}
{% block title %}{{ super() }} - 账户管理{% endblock %}
{% block content %}
<h2>账户管理</h2>
<hr>
<div class="row">
    <div class="col-md-6">
        <div class="card mb-3">
            <div class="card-header"><strong>修改密码</strong></div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">当前密码</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" name="new_password" class="form-control" required minlength="14">
                        <small class="text-muted">至少14位，需包含大写字母、小写字母、数字和特殊字符</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="14">
                    </div>
                    <button type="submit" class="btn btn-primary">修改密码</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
