{% extends "base.html" %}
{% block title %}创建班级{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-4">
        <h2>创建班级</h2>
        <hr>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">班级名称</label>
                <input type="text" name="class_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">班级号</label>
                <input type="text" name="class_no" class="form-control" placeholder="如 2024CST01" required>
                <small class="text-muted">只能包含大写英文字母和数字</small>
            </div>
            <div class="mb-3">
                <label class="form-label">所属系部</label>
                <select name="department_id" class="form-select" required>
                    <option value="">请选择系部</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if departments|length == 1 %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="alert alert-info">
                您将自动成为该班级的班主任。
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
    		<button type="submit" name="action" value="create" class="btn btn-primary">创建</button>
            <button type="submit" name="action" value="continue" class="btn btn-outline-primary ms-2">创建并继续</button>
	    </div>
        </form>
    </div>
</div>
{% endblock %}
