{% extends "base.html" %}
{% block title %}{{ super() }} - 修改密码{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>修改密码</h2>
        <hr>

        {% if current_user.verification_attempts >= 3 %}
        <div class="alert alert-danger">
            ⚠️ 验证码错误次数过多，修改密码功能已锁定。请联系班主任或管理员解锁。
        </div>
        {% else %}
        <div class="card mb-3">
        </div>
        <form method="post">
            <div class="mb-3">
                <label for="new_password" class="form-label">新密码</label>
                <input type="password" name="new_password" id="new_password" class="form-control" required minlength="8">
                <small class="text-muted">至少8位，需包含大写字母、小写字母和数字</small>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">确认新密码</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required minlength="8">
            </div>
            <div class="mb-3">
                <label class="form-label">验证码（发送至 {{ current_user.email }}）</label>
                <div class="input-group">
                    <input type="text" name="code" id="code" class="form-control" required placeholder="6位数字">
                    <button type="button" id="sendCodeBtn" class="btn btn-outline-primary" onclick="sendVerifyCode()">获取验证码</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function sendVerifyCode() {
    var btn = document.getElementById('sendCodeBtn');
    btn.disabled = true;
    btn.innerText = '发送中...';

    fetch('/send_verify_code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'email=' + encodeURIComponent('{{ current_user.email }}')
    }).then(res => res.json()).then(data => {
        if (data.status === 'success') {
            alert('验证码已发送，请查收邮件');
            var seconds = 60;
            btn.innerText = seconds + '秒后重发';
            var timer = setInterval(function() {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '获取验证码';
                } else {
                    btn.innerText = seconds + '秒后重发';
                }
            }, 1000);
        } else {
            alert(data.msg || '发送失败');
            btn.disabled = false;
            btn.innerText = '获取验证码';
        }
    }).catch(err => {
        alert('请求失败');
        btn.disabled = false;
        btn.innerText = '获取验证码';
    });
}
</script>
{% endblock %}
