{% extends "base.html" %}
{% block title %}学生账号注册{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-5">
        <h2 class="text-center mb-4">学生注册</h2>
        <form method="post" id="registerForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" name="username" id="username" class="form-control" required minlength="3" pattern="[A-Za-z0-9_]+" title="只能包含英文字母、数字和下划线">
                <small class="text-muted">支持英文字母、数字、下划线，长度不少于3位</small>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" name="password" id="password" class="form-control" required minlength="8">
                <small class="text-muted">至少8位，需包含大写字母、小写字母和数字</small>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <div class="input-group">
                    <input type="email" name="email" id="emailInput" class="form-control" required>
                    <button type="button" id="sendCodeBtn" class="btn btn-outline-primary" onclick="sendVerifyCode()">获取验证码</button>
                </div>
            </div>
            <div class="mb-3">
                <label for="email_code" class="form-label">邮箱验证码</label>
                <input type="text" name="email_code" id="email_code" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">注册</button>
        </form>
        <div class="mt-3 text-center">
            已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/email_verify.js') }}"></script>
{% endblock %}
